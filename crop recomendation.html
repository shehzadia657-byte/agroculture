<!DOCTYPE html>
<html>
<head>
    <title>Farmer Dashboard - AgroAI</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: green;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .section {
            padding: 30px;
            text-align: center;
        }
        select, button {
            padding: 10px;
            margin: 10px;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            max-width: 600px;
        }
        th, td {
            padding: 10px;
            border: 1px solid green;
            text-align: center;
        }
        th {
            background-color: #e0f7e0;
        }
    </style>
</head>
<body>

<header>
    <h1>👨‍🌾 Farmer Dashboard - AgroAI</h1>
</header>



<div class="section">
    <h2>Select Crop to See Details</h2>
    <select id="cropSelect">
        <option value="">--Choose Crop--</option>
        <option value="millet">Millet</option>
        <option value="sorghum">Sorghum</option>
        <option value="groundnut">Groundnut</option>
        <option value="rice">Rice</option>
        <option value="sugarcane">Sugarcane</option>
        <option value="maize">Maize</option>
        <option value="wheat">Wheat</option>
        <option value="tomato">Tomato</option>
        <option value="potato">Potato</option>
    </select>
    <br>
    <button onclick="showCropInfo()">Show Crop Info</button>

    <div id="cropInfo"></div>
</div>

<script>
    const cropData = {
        "millet": {
            type: "Dry Land Crop",
            watering: "Low - needs minimal water",
            budget: "$50 - $100 per acre",
            sellingRate: "$0.5 per kg"
        },
        "sorghum": {
            type: "Dry Land Crop",
            watering: "Low - needs minimal water",
            budget: "$60 - $120 per acre",
            sellingRate: "$0.6 per kg"
        },
        "groundnut": {
            type: "Dry Land Crop",
            watering: "Moderate",
            budget: "$80 - $150 per acre",
            sellingRate: "$1 per kg"
        },
        "rice": {
            type: "Rainy Land Crop",
            watering: "High - needs flooded fields",
            budget: "$200 - $300 per acre",
            sellingRate: "$1.2 per kg"
        },
        "sugarcane": {
            type: "Rainy Land Crop",
            watering: "High - frequent irrigation",
            budget: "$250 - $400 per acre",
            sellingRate: "$0.8 per kg"
        },
        "maize": {
            type: "Rainy Land Crop",
            watering: "Moderate to High",
            budget: "$100 - $200 per acre",
            sellingRate: "$0.7 per kg"
        },
        "wheat": {
            type: "Fertile Land Crop",
            watering: "Moderate",
            budget: "$70 - $150 per acre",
            sellingRate: "$0.5 per kg"
        },
        "tomato": {
            type: "Fertile Land Crop",
            watering: "Moderate - daily watering",
            budget: "$150 - $250 per acre",
            sellingRate: "$1.5 per kg"
        },
        "potato": {
            type: "Fertile Land Crop",
            watering: "Moderate",
            budget: "$100 - $200 per acre",
            sellingRate: "$1 per kg"
        }
    };

    function showCropInfo() {
        const crop = document.getElementById("cropSelect").value;
        const infoDiv = document.getElementById("cropInfo");

        if (!crop) {
            infoDiv.innerHTML = "<p style='color:red;'>Please select a crop!</p>";
            return;
        }

        const data = cropData[crop];

        infoDiv.innerHTML = `
            <table>
                <tr><th>Crop Name</th><td>${crop.charAt(0).toUpperCase() + crop.slice(1)}</td></tr>
                <tr><th>Type</th><td>${data.type}</td></tr>
                <tr><th>Watering Season</th><td>${data.watering}</td></tr>
                <tr><th>Budget</th><td>${data.budget}</td></tr>
                <tr><th>Selling Rate</th><td>${data.sellingRate}</td></tr>
            </table>
        `;
    }
</script>

</body>
</html>
