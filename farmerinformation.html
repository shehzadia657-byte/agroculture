```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Information</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#eaf4ea;
    margin:0;
}

header{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:70%;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    color:#2e7d32;
    text-align:center;
}

label{
    font-weight:bold;
    display:block;
    margin-top:12px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

#result{
    margin-top:20px;
    padding:15px;
    background:#f1f8e9;
    border-radius:5px;
    display:none;
}
</style>
</head>

<body>

<header>
    <h1>Farmer Information Form</h1>
</header>

<div class="container">

<h2>Enter Farm Details</h2>

<label>Farmer Name</label>
<input type="text" id="name">

<label>Land Area (Acres)</label>
<input type="number" id="area">

<label>Land Type</label>
<select id="land">
    <option>Fertile</option>
    <option>Sandy</option>
    <option>Clay</option>
    <option>Loamy</option>
</select>

<label>Budget (PKR)</label>
<input type="number" id="budget">

<label>Available Time</label>
<select id="time">
    <option>Part Time</option>
    <option>Full Time</option>
</select>

<label>Water Availability</label>
<select id="water">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
</select>

<label>Additional Notes</label>
<textarea id="notes"></textarea>

<button onclick="saveInfo()">Submit Information</button>

<div id="result"></div>

</div>

<script>
function saveInfo(){

let name=document.getElementById("name").value;
let area=document.getElementById("area").value;
let land=document.getElementById("land").value;
let budget=document.getElementById("budget").value;
let time=document.getElementById("time").value;
let water=document.getElementById("water").value;

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
"<h3>Farmer Profile Saved</h3>" +
"<p><b>Name:</b> "+name+"</p>" +
"<p><b>Area:</b> "+area+" Acres</p>" +
"<p><b>Land Type:</b> "+land+"</p>" +
"<p><b>Budget:</b> PKR "+budget+"</p>" +
"<p><b>Time:</b> "+time+"</p>" +
"<p><b>Water:</b> "+water+"</p>";
}
</script>

</body>
</html>
