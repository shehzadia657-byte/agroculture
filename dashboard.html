<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }
        /* Sidebar */
        .sidebar {
            width: 200px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .sidebar h2 {
            margin: 0 0 20px 0;
        }
        .sidebar button {
            margin-bottom: 10px;
            padding: 10px;
            border: none;
            background-color: #34495e;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .sidebar button:hover {
            background-color: #1abc9c;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 20px;
            background-color: #ecf0f1;
        }

        /* Header */
        .header {
            background-color: #3498db;
            color: white;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        /* Logged in message */
        .logged-in {
            display: none;
            padding: 20px;
            background-color: #2ecc71;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Dashboard</h2>
        <button onclick="showLogin()">Login</button>
        <button onclick="alert('Clicked Settings')">Settings</button>
        <button onclick="alert('Clicked Profile')">Profile</button>
        <button onclick="alert('Clicked Logout')">Logout</button>
    </div>
    <div class="main">
        <div class="header">Welcome to Dashboard</div>
        <div id="loginMessage" class="logged-in">
            You are now logged in!
        </div>
        <p>type your queries.</p>
    </div>

    <script>
        function showLogin() {
            document.getElementById('loginMessage').style.display = 'block';
        }
    </script>
</body>
</html>
