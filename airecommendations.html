<!DOCTYPE html>
<html>
<head>
    <title>AgroAI - Crop Recommendations</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: green;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .section {
            padding: 30px;
            text-align: center;
        }
        select, button {
            padding: 10px;
            margin: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

<header>
    <h1>🌱 AgroAI Crop Recommendations</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="ai-recommendations.html">AI Recommendations</a>
    
</nav>

<div class="section">
    <h2>Select Your Land Type</h2>
    <select id="landType">
        <option value="">--Choose Land Type--</option>
        <option value="dry">Dry Land</option>
        <option value="rainy">Rainy Land</option>
        <option value="fertile">Fertile Land</option>
    </select>
    <br>
    <button onclick="recommendCrops()">Get AI Recommendation</button>

    <div class="result" id="recommendation"></div>
</div>

<script>
    function recommendCrops() {
        const landType = document.getElementById("landType").value;
        const recommendation = document.getElementById("recommendation");

        if (!landType) {
            recommendation.textContent = "Please select a land type!";
            return;
        }

        let crops = [];

        if (landType === "dry") {
            crops = ["Millet", "Sorghum", "Groundnut"];
        } else if (landType === "rainy") {
            crops = ["Rice", "Sugarcane", "Maize"];
        } else if (landType === "fertile") {
            crops = ["Wheat", "Tomato", "Potato"];
        }

        recommendation.textContent = "Recommended Crops: " + crops.join(", ");
    }
</script>

</body>
</html>
