<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - AgroAI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .contact-section {
            background-color: #e8f5e9;
            padding: 50px 20px;
            text-align: center;
        }

        .contact-section h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
            font-size: 18px;
        }

        .contact-info a {
            text-decoration: none;
            color: #1a237e;
            transition: color 0.3s;
        }

        .contact-info a:hover {
            color: #2e7d32;
        }

        .contact-info p {
            margin: 0;
        }
    </style>
</head>
<body>

    <section class="contact-section">
        <h2>Contact Us</h2>
        <div class="contact-info">
            <p>📞 Phone: <a href="tel:+923001234567">+92 300 1234567</a></p>
            <p>✉️ Email: <a href="mailto:info@agroai.com">info@agroai.com</a></p>
            <p>📸 Instagram: <a href="https://www.instagram.com/yourpage" target="_blank">@agroculture</a></p>
            <p>💼 LinkedIn: <a href="https://www.linkedin.com/in/yourprofile" target="_blank">Agro culture</a></p>
        </div>
    </section>

</body>
</html>
