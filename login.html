<!DOCTYPE html>
<html>
<head>
    <title>Login - AgroAI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b2e13;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: black;
            color: white;
            border: 1px solid green;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="user" placeholder="Enter Name">
    <input type="password" id="pass" placeholder="Enter Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    // no validation at all
    window.location.href = "farmerinformation.html";
}
</script>

</body>
</html>
